name: CI

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: 22

jobs:
  # 1. Cheapest check first: reject bad PR titles before anything else runs.
  pr-title-lint:
    name: PR title lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Validate every commit message in the PR follows Conventional Commits.
  commitlint:
    name: Commit lint
    needs: pr-title-lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: wagoid/commitlint-github-action@v6

  # 3. Scan for leaked secrets before spending time on lint/build.
  gitleaks:
    name: Gitleaks
    needs: commitlint
    if: |
      always() &&
      (needs.commitlint.result == 'success' || needs.commitlint.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 4. Astro's own diagnostics (type-checking, template errors).
  lint:
    name: Astro check
    needs: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  # 5. Code quality / correctness rules.
  eslint:
    name: ESLint
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint:eslint

  # 6. Formatting consistency.
  format:
    name: Prettier format check
    needs: eslint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run format:check

  # 7. Slowest check last: only build if everything above already passed.
  build:
    name: Build
    needs: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  # 8. Performance / accessibility / SEO score gate on the built site.
  lighthouse:
    name: Lighthouse CI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json

  # 9. Since this is a link-hub page, make sure every outbound link still resolves.
  broken-links:
    name: Broken link check
    needs: lighthouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress './dist/**/*.html'
          fail: true
